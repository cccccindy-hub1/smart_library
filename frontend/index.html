<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Global Smart Library</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-inner">
          <div class="brand">
            <div class="brand-title">Global Smart Library</div>
            <div class="brand-sub">Belfer 本地知识库 / 图书馆</div>
          </div>

          <div class="search-wrap">
            <input id="searchInput" class="search-input" type="text" placeholder="Search articles..." />
          </div>

          <div class="section">
            <div class="section-title">Library</div>
            <div class="nav-list">
              <button id="navAllBtn" class="nav-link active" type="button"><span>All Articles</span><span id="navAllCount" class="count-badge">0</span></button>
              <button id="navStarredBtn" class="nav-link" type="button"><span>Starred</span><span id="navStarredCount" class="count-badge">0</span></button>
              <button id="navRecentBtn" class="nav-link" type="button"><span>Recently Read</span><span id="navRecentCount" class="count-badge">0</span></button>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Tools</div>
            <div class="nav-list">
              <a class="nav-anchor" href="./home.html">主页面</a>
              <a class="nav-anchor" href="./crawl.html">数据爬取</a>
            </div>
          </div>

          <div class="section">
            <div class="section-title">Filters</div>
            <div class="filter-group">
              <label for="topicFilter">Topic</label>
              <select id="topicFilter" class="filter-select">
                <option value="">All</option>
              </select>

              <label for="sourceFilter">Source</label>
              <select id="sourceFilter" class="filter-select">
                <option value="">All</option>
              </select>
            </div>
          </div>

          <div class="section grow">
            <div class="section-title">Data Sources</div>
            <div id="sourceList" class="source-list"></div>
          </div>
        </div>
      </aside>

      <section class="main-content">
        <header class="main-header">
          <div>
            <div id="currentSourceName" class="current-source-name">Select a data source</div>
            <div id="currentSourceMeta" class="current-source-meta">Load CSV from result/</div>
          </div>
          <div class="header-tools">
            <div class="stats-inline">
              <span>Total <b id="statTotal">-</b></span>
              <span>Filtered <b id="statFiltered">-</b></span>
              <span>Range <b id="statRange">-</b></span>
            </div>
            <label class="page-size">Per page
              <select id="pageSize">
                <option value="10">10</option>
                <option value="20" selected>20</option>
                <option value="50">50</option>
              </select>
            </label>
            <button id="markAllReadBtn" class="btn" type="button">Mark all read</button>
          </div>
        </header>

        <div id="stats" class="status-line"></div>

        <div class="article-scroll">
          <div id="articleList" class="article-list"></div>
        </div>

        <footer class="pager">
          <button id="prevBtn" class="btn ghost" type="button">Prev</button>
          <span id="pageInfo"></span>
          <button id="nextBtn" class="btn ghost" type="button">Next</button>
        </footer>
      </section>
    </main>

    <aside id="detailDrawer" class="drawer hidden">
      <div class="drawer-content">
        <div class="drawer-head">
          <div class="drawer-title-row">
            <h2 id="detailTitle" class="drawer-title">Details</h2>
            <button id="favoriteBtn" class="icon-btn" type="button" title="Star/unstar">☆</button>
          </div>
          <button id="closeDrawer" class="btn btn-plain" type="button">Close</button>
        </div>
        <div id="detailBody" class="detail-body"></div>
      </div>
    </aside>

    <script src="./app.js"></script>
  </body>
</html>
